<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Expense Tracker Dashboard</title>

    <link rel="stylesheet"
          href="expense.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

    <!-- Header -->

    <header>

        <h1>Expense Tracker Dashboard</h1>

        <button id="themeBtn">

            🌙 Dark Mode

        </button>

    </header>


    <!-- Summary Cards -->

    <section class="cards">

        <div class="card income">

            <h3>Total Income</h3>

            <p id="income">

                ₹0

            </p>

        </div>

        <div class="card expense">

            <h3>Total Expense</h3>

            <p id="expense">

                ₹0

            </p>

        </div>

        <div class="card balance">

            <h3>Balance</h3>

            <p id="balance">

                ₹0

            </p>

        </div>

    </section>


    <!-- Transaction Form -->

    <section class="formBox">

        <input
            type="text"
            id="desc"
            placeholder="Description">

        <input
            type="number"
            id="amount"
            placeholder="Amount">

        <select id="category">

            <option value="Food">

                Food

            </option>

            <option value="Travel">

                Travel

            </option>

            <option value="Shopping">

                Shopping

            </option>

            <option value="Bills">

                Bills

            </option>

            <option value="Salary">

                Salary

            </option>

            <option value="Entertainment">

                Entertainment

            </option>

            <option value="Other">

                Other

            </option>

        </select>


        <select id="type">

            <option value="income">

                Income

            </option>

            <option value="expense">

                Expense

            </option>

        </select>


        <button id="addBtn">

            Add Transaction

        </button>

    </section>


    <!-- Search and Filter -->

    <section class="controls">

        <input
            type="text"
            id="search"
            placeholder="Search Transactions">

        <select id="filter">

            <option value="all">

                All Transactions

            </option>

            <option value="income">

                Income

            </option>

            <option value="expense">

                Expense

            </option>

        </select>

    </section>


    <!-- Table -->

    <section class="tableBox">

        <table>

            <thead>

                <tr>

                    <th>Description</th>

                    <th>Category</th>

                    <th>Amount</th>

                    <th>Type</th>

                    <th>Date</th>

                    <th>Action</th>

                </tr>

            </thead>

            <tbody id="tbody">

            </tbody>

        </table>

    </section>


    <!-- Chart -->

    <section class="chartBox">

        <h2>

            Expense Analytics

        </h2>

        <canvas id="myChart">

        </canvas>

    </section>

</div>


<script src="expense.js"></script>

</body>

</html>
